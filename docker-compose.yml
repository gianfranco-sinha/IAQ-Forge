services:
  iaq4j:
    build: .
    container_name: iaq4j
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    environment:
      - ROOT_PATH=/iaq
      - API_KEY=${API_KEY:-}
      - ENVIRONMENT=production
      - KAN_REMOTE_URL=http://kan-sidecar:8001
      - KAN_REMOTE_TIMEOUT=0.5
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./trained_models:/app/trained_models:ro
      - ./database_config.yaml:/app/database_config.yaml:ro
      - ./model_config.yaml:/app/model_config.yaml:ro
    networks:
      - iotstack_default
    depends_on:
      kan-sidecar:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  kan-sidecar:
    build: ./kan_sidecar
    container_name: iaq4j-kan
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m
    volumes:
      - ./trained_models/kan:/app/trained_models/kan:ro
      - ./model_config.yaml:/app/model_config.yaml:ro
    networks:
      - iotstack_default
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 3s
      retries: 3

networks:
  iotstack_default:
    external: true
